version: "3.9"

services:
  nonce:
    build: .
    image: nonce-api:latest
    container_name: nonce-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NONCE_DEV=false                        # set to true for local dev
      - NONCE_JWT_SECRET=${NONCE_JWT_SECRET}  # set in .env
    volumes:
      - nonce_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nonce_data:
    driver: local
